<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danske Cykelryttere – Fødesteder</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e; color: #e0e0e0;
      display: flex; flex-direction: column; height: 100vh;
    }

    header {
      padding: 8px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }

    header h1 { font-size: 0.95rem; font-weight: 700; color: #e94560; white-space: nowrap; }
    .sep { width: 1px; height: 20px; background: #0f3460; flex-shrink: 0; }
    .filter-group { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .filter-label { font-size: 0.7rem; color: #888; white-space: nowrap; }

    .btn {
      padding: 3px 10px; border-radius: 12px;
      border: 1px solid #0f3460; background: #0f3460;
      color: #aaa; font-size: 0.72rem; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn.active, .btn:hover { background: #e94560; border-color: #e94560; color: #fff; }
    .btn.cat-uwt.active { background: #f5a623; border-color: #f5a623; color: #000; }
    .btn.cat-pro.active { background: #7ed321; border-color: #7ed321; color: #000; }
    .btn.cat-hc.active  { background: #4a9eff; border-color: #4a9eff; color: #000; }
    .btn.cat-wc.active  { background: #bd10e0; border-color: #bd10e0; }

    input[type=range] {
      -webkit-appearance: none; height: 4px; border-radius: 2px;
      background: #0f3460; outline: none; cursor: pointer; width: 80px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: #e94560;
    }
    .slider-val { font-size: 0.78rem; color: #e94560; font-weight: 700; min-width: 28px; }

    input[type=text] {
      padding: 3px 10px; border-radius: 12px;
      border: 1px solid #0f3460; background: #0f3460;
      color: #e0e0e0; font-size: 0.78rem; width: 150px; outline: none;
    }
    input[type=text]::placeholder { color: #555; }
    input[type=text]:focus { border-color: #e94560; }

    .stats { margin-left: auto; font-size: 0.72rem; color: #555; white-space: nowrap; }

    #map { flex: 1; }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: #16213e; color: #e0e0e0;
      border: 1px solid #0f3460; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.6);
    }
    .leaflet-popup-tip { background: #16213e; }
    .leaflet-popup-content { margin: 10px 12px; width: 300px !important; }

    .pop-place { font-size: 0.95rem; font-weight: 700; color: #e94560; margin-bottom: 6px; }
    .pop-riders { max-height: 400px; overflow-y: auto; padding-right: 2px; }
    .pop-riders::-webkit-scrollbar { width: 4px; }
    .pop-riders::-webkit-scrollbar-track { background: #0f3460; }
    .pop-riders::-webkit-scrollbar-thumb { background: #e94560; border-radius: 2px; }

    .pop-rider { padding: 6px 0; border-bottom: 1px solid #1e2d50; }
    .pop-rider:last-child { border-bottom: none; }
    .pop-rider-name { font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .pop-rider-name.m { color: #4a9eff; }
    .pop-rider-name.f { color: #ff6b9d; }
    .pop-meta { font-size: 0.72rem; color: #666; margin: 2px 0 4px; }

    .wins-label { font-size: 0.68rem; color: #f5a623; font-weight: 700; }
    .rank-dk-badge { font-size: 0.68rem; color: #C60C30; font-weight: 700; }
    .pop-rank-row { margin: 1px 0 3px; }
    .wiki-link { font-size: 0.68rem; color: #4a9eff; text-decoration: none; }
    .wiki-link:hover { text-decoration: underline; }

    .pop-results { display: flex; flex-direction: column; gap: 2px; }
    .pop-result { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: #bbb; }
    .rank-badge {
      font-size: 0.62rem; font-weight: 700;
      padding: 1px 4px; border-radius: 6px; min-width: 18px; text-align: center; flex-shrink: 0;
    }
    .rank-1 { background: #f5a623; color: #000; }
    .rank-2 { background: #aaa;    color: #000; }
    .rank-3 { background: #cd7f32; color: #fff; }
    .cls-badge { font-size: 0.6rem; padding: 1px 3px; border-radius: 3px; background: #0f3460; color: #aaa; flex-shrink: 0; }
    .cls-uwt { background: #f5a623; color: #000; }
    .cls-pro { background: #7ed321; color: #000; }
    .cls-hc  { background: #4a9eff; color: #000; }
    .cls-wc  { background: #bd10e0; color: #fff; }

    .leaflet-control-zoom a { background:#16213e!important; color:#e0e0e0!important; border-color:#0f3460!important; }
    .leaflet-control-zoom a:hover { background:#0f3460!important; }
  </style>
</head>
<body>

<header>
  <h1>Danske Cykelryttere</h1>

  <div class="sep"></div>

  <div class="filter-group">
    <span class="filter-label">Kon</span>
    <button class="btn active" data-gender="all">Alle</button>
    <button class="btn" data-gender="mand">Mænd</button>
    <button class="btn" data-gender="kvinde">Kvinder</button>
  </div>

  <div class="sep"></div>

  <div class="filter-group">
    <span class="filter-label">Min. sejre</span>
    <input type="range" id="wins-slider" min="0" max="40" value="0">
    <span class="slider-val" id="wins-val">0</span>
  </div>

  <div class="sep"></div>

  <div class="filter-group">
    <span class="filter-label">Min. ryttere pr. by</span>
    <input type="range" id="city-slider" min="1" max="10" value="1">
    <span class="slider-val" id="city-val">1</span>
  </div>

  <div class="sep"></div>

  <div class="filter-group">
    <span class="filter-label">Fodselsaar</span>
    <input type="range" id="year-from" min="1868" max="2010" value="1868">
    <span class="slider-val" id="year-from-val">1868</span>
    <span style="color:#555;font-size:0.7rem">–</span>
    <input type="range" id="year-to" min="1868" max="2010" value="2010">
    <span class="slider-val" id="year-to-val">2010</span>
  </div>

  <div class="sep"></div>

  <div class="filter-group">
    <span class="filter-label">Lobstype</span>
    <button class="btn cat-uwt active" data-cat="UWT">UWT/GT</button>
    <button class="btn cat-pro active" data-cat="Pro">Pro Series</button>
    <button class="btn cat-hc  active" data-cat="HC">HC/1.1</button>
    <button class="btn cat-wc  active" data-cat="WC">VM/OL</button>
    <button class="btn active"         data-cat="other">Ældre</button>
  </div>

  <div class="sep"></div>

  <div class="sep"></div>

  <div class="filter-group">
    <button class="btn" id="ranked-btn" data-ranked="false">Kun DK all-time rangliste</button>
  </div>

  <div class="sep"></div>

  <input type="text" id="search" placeholder="Søg rytter eller by...">
  <div class="stats" id="stats"></div>
</header>

<div id="map"></div>

<script>
// ── Kort ──────────────────────────────────────────────────────────────────
const map = L.map("map").setView([56.0, 10.5], 7);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 18
}).addTo(map);

// ── Løbsklasse → kategori ─────────────────────────────────────────────────
function classToCat(cls) {
  if (!cls) return "other";
  const u = cls.toUpperCase().trim();
  if (u.includes("UWT") || u === "WT" || u === "CDM" || u === "GT") return "UWT";
  if (u.includes("PRO"))                                               return "Pro";
  if (u.includes("HC") || u === "1.1" || u === "2.1")                return "HC";
  if (u === "WC" || u === "OLYMPICS" || u === "OWG")                  return "WC";
  return "other";
}

function classBadge(cls) {
  const cat = classToCat(cls);
  const c = { UWT:"cls-uwt", Pro:"cls-pro", HC:"cls-hc", WC:"cls-wc" };
  return `<span class="cls-badge ${c[cat]||''}">${cls || '?'}</span>`;
}

// ── PCS All-time rangliste (DK) ───────────────────────────────────────────
// Nøgle: "fødselsår_EFTERNAVN" (store bogstaver, første ord i PCS-navn)
const PCS_RANKING = {

  "1995_ASGREEN":     {rank:7,  allTime:520,  points:114},

  "1959_VAGN":        {rank:23, allTime:1375, points:28},
  "1962_WELTZ":       {rank:24, allTime:1458, points:25},
  "1980_BAK":         {rank:25, allTime:1556, points:22},
  "2002_LUND":        {rank:26, allTime:1791, points:17},
  "1985_MØRKØV":      {rank:26, allTime:1791, points:17},
  "1941_FREY":        {rank:28, allTime:1929, points:15},
  "1902_HANSEN":      {rank:28, allTime:1929, points:15},
  "1966_PEDERSEN":    {rank:30, allTime:1981, points:14},
  "1971_BO":          {rank:30, allTime:1981, points:14},
  "1998_KRON":        {rank:30, allTime:1981, points:14},
  "1968_MICHAEL":     {rank:30, allTime:1981, points:14},
  "1872_HANSEN":      {rank:34, allTime:2041, points:13},
  "1968_SANDSTØD":    {rank:34, allTime:2041, points:13},
  "1954_ØRSTED":      {rank:36, allTime:2149, points:12},
  "1984_ANKER":       {rank:37, allTime:2273, points:11},
  "1945_SCHMIDT":     {rank:38, allTime:2336, points:10},
  "1973_BLAUDZUN":    {rank:39, allTime:2408, points:9},
  "1961_CARLSEN":     {rank:40, allTime:2453, points:8},
  "1942_RODIAN":      {rank:40, allTime:2453, points:8},
  "1962_HOLM":        {rank:42, allTime:2710, points:7},
  "1959_WORRE":       {rank:42, allTime:2710, points:7},
  "1997_HONORE":      {rank:42, allTime:2710, points:7},
  "1998_BJERG":       {rank:42, allTime:2710, points:7},
  "1965_LILHOLT":     {rank:46, allTime:2789, points:6},
  "1968_MARCUSSEN":   {rank:46, allTime:2789, points:6},
  "1993_KAMP":        {rank:46, allTime:2789, points:6},
  "1994_WÜRTZ":       {rank:46, allTime:2789, points:6},
  "1946_BLAUDZUN":    {rank:46, allTime:2789, points:6},
  "1914_GRUNDAHL":    {rank:51, allTime:2879, points:5},
  "1996_PEDERSEN":    {rank:52, allTime:3013, points:4},
  "1936_LYKKE":       {rank:52, allTime:3013, points:4},
  "1989_JUUL":        {rank:54, allTime:3433, points:3},
  "1963_PETERSEN":    {rank:54, allTime:3433, points:3},
  "1985_TOFT":        {rank:54, allTime:3433, points:3},
  "1961_FROST":       {rank:54, allTime:3433, points:3},
  "1941_EUGEN":       {rank:54, allTime:3433, points:3},
  "1962_VEGGERBY":    {rank:54, allTime:3433, points:3},
  "1966_MEINERT":     {rank:54, allTime:3433, points:3},
  "1991_LANDER":      {rank:54, allTime:3433, points:3},
  "2002_SØJBERG":     {rank:54, allTime:3433, points:3},
  "1973_HØJ":         {rank:54, allTime:3433, points:3},
  "1970_BO":          {rank:64, allTime:3813, points:2},
  "1990_QUAADE":      {rank:64, allTime:3813, points:2},
  "1927_EDMUND":      {rank:64, allTime:3813, points:2},
  "1912_SØRENSEN":    {rank:64, allTime:3813, points:2},
  "1964_PEDERSEN":    {rank:64, allTime:3813, points:2},
  "1981_VANDBORG":    {rank:69, allTime:4032, points:1},
  "1962_ANDERSEN":    {rank:69, allTime:4032, points:1},
  "1969_BLIGAARD":    {rank:69, allTime:4032, points:1},
  "1942_SKIBBY":      {rank:69, allTime:4032, points:1},
  "1997_NORSGAARD":   {rank:69, allTime:4032, points:1},
  "1999_PRICE-PEJTERSEN": {rank:69, allTime:4032, points:1},
  "1997_LARSEN":      {rank:69, allTime:4032, points:1},
};

function getPcsRank(rider) {
  const born = rider.birthdate ? rider.birthdate.slice(0,4) : null;
  if (!born) return null;
  const words = rider.name.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").split(" ");
  // Also try original (with diacritics)
  const wordsRaw = rider.name.toUpperCase().split(" ");
  for (const w of [...new Set([...words, ...wordsRaw])]) {
    const key = `${born}_${w}`;
    if (PCS_RANKING[key]) return PCS_RANKING[key];
  }
  return null;
}

// ── State ─────────────────────────────────────────────────────────────────
let allData = [];
let layerGroup = L.layerGroup().addTo(map);
let activeGender = "all";
let activeCats = new Set(["UWT","Pro","HC","WC","other"]);
let minWins = 0, minCitySize = 1, yearFrom = 1868, yearTo = 2010;
let onlyRanked = false;

// ── Ikon ──────────────────────────────────────────────────────────────────
function makeIcon(count) {
  const r = count > 1 ? 8 : 5;
  const size = r * 2 + 4;
  return L.divIcon({
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="#C60C30" stroke="white" stroke-width="1.5"/>
      ${count > 1 ? `<text x="${size/2}" y="${size/2+3.5}" text-anchor="middle" font-size="7" fill="white" font-weight="bold">${count}</text>` : ''}
    </svg>`,
    className: "", iconSize: [size,size], iconAnchor: [size/2,size/2]
  });
}

// ── Filtrering ────────────────────────────────────────────────────────────
function filteredResults(rider) {
  return (rider.results || []).filter(r => activeCats.has(classToCat(r.race_class)));
}

function countFilteredWins(rider) {
  return filteredResults(rider).filter(r => r.rank === 1).length;
}

function riderYear(r) {
  return r.birthdate ? parseInt(r.birthdate.slice(0,4)) : null;
}

// ── Render ────────────────────────────────────────────────────────────────
function renderMarkers(data) {
  layerGroup.clearLayers();

  // Grupper per koordinat
  const byCoord = {};
  for (const r of data) {
    if (!r.latitude || !r.longitude) continue;
    const key = `${r.latitude.toFixed(4)},${r.longitude.toFixed(4)}`;
    if (!byCoord[key]) byCoord[key] = { lat: r.latitude, lon: r.longitude, place: r.birthplace, riders: [] };
    byCoord[key].riders.push(r);
  }

  for (const loc of Object.values(byCoord)) {
    if (loc.riders.length < minCitySize) continue;

    const marker = L.marker([loc.lat, loc.lon], {
      icon: makeIcon(loc.riders.length)
    });

    marker.bindTooltip(loc.place || "Ukendt", { permanent: false, direction: "top", offset: [0, -6] });
    marker.bindPopup(() => buildPopup(loc), { maxWidth: 340, maxHeight: 500 });
    layerGroup.addLayer(marker);
  }
}

function buildPopup(loc) {
  const totalWins = loc.riders.reduce((s, r) => s + countFilteredWins(r), 0);
  const winsStr = totalWins > 0 ? ` · ${totalWins} sejre` : "";

  const ridersHtml = loc.riders.map(r => {
    const res = filteredResults(r);
    const wins = res.filter(x => x.rank === 1).length;

    const resSorted = [...res].sort((a, b) => (b.pcs_points || 0) - (a.pcs_points || 0));
    const resultsHtml = resSorted.map(x =>
      `<div class="pop-result">
        <span class="rank-badge rank-${x.rank <= 3 ? x.rank : ''}">${x.rank}</span>
        <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${x.race_name}</span>
        ${classBadge(x.race_class)}
        ${x.pcs_points ? `<span style="color:#888;font-size:0.68rem;flex-shrink:0">${x.pcs_points}p</span>` : ''}
        <span style="color:#555;font-size:0.68rem;flex-shrink:0">${(x.date||'').slice(0,4)}</span>
      </div>`
    ).join("");

    const winsLabel = wins > 0 ? `<span class="wins-label">${wins} sejre</span>` : "";
    const wikiLink = r.wikipedia_url
      ? `<a class="wiki-link" href="${r.wikipedia_url}" target="_blank">Wikipedia</a>`
      : "";
    const pcsRank = getPcsRank(r);
    const rankLabel = pcsRank
      ? `<span class="rank-dk-badge" title="DK all-time #${pcsRank.rank} · ${pcsRank.points} pt">#${pcsRank.rank} DK · ${pcsRank.points}pt</span>`
      : "";

    return `<div class="pop-rider">
      <div class="pop-rider-name ${r.gender==='kvinde'?'f':'m'}">
        ${r.name}${winsLabel ? ' ' : ''}${winsLabel}${wikiLink ? ' ' : ''}${wikiLink}
      </div>
      ${rankLabel ? `<div class="pop-rank-row">${rankLabel}</div>` : ''}
      <div class="pop-meta">${r.birthdate ? r.birthdate.slice(0,4) : '?'}${r.current_team ? ' · ' + r.current_team : ''}</div>
      ${res.length > 0 ? `<div class="pop-results">${resultsHtml}</div>` : ''}
    </div>`;
  }).join("");

  const el = document.createElement("div");
  el.innerHTML = `
    <div class="pop-place">${loc.place || 'Ukendt'}${winsStr}</div>
    <div class="pop-riders">${ridersHtml}</div>`;
  return el;
}

function applyFilters() {
  const query = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(r => {
    if (activeGender !== "all" && r.gender !== activeGender) return false;
    const yr = riderYear(r);
    if (yr && (yr < yearFrom || yr > yearTo)) return false;
    if (query.length > 1 && !r.name.toLowerCase().includes(query) &&
        !(r.birthplace||"").toLowerCase().includes(query)) return false;
    if (minWins > 0 && countFilteredWins(r) < minWins) return false;
    if (onlyRanked && !getPcsRank(r)) return false;
    return true;
  });

  const withCoords = filtered.filter(r => r.latitude).length;
  document.getElementById("stats").textContent = `${withCoords} ryttere · ${filtered.length} i alt`;
  renderMarkers(filtered);
}

// ── Events ────────────────────────────────────────────────────────────────
document.querySelectorAll("[data-gender]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-gender]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeGender = btn.dataset.gender;
    applyFilters();
  });
});

document.querySelectorAll("[data-cat]").forEach(btn => {
  btn.addEventListener("click", () => {
    const cat = btn.dataset.cat;
    if (activeCats.has(cat)) { activeCats.delete(cat); btn.classList.remove("active"); }
    else                     { activeCats.add(cat);    btn.classList.add("active"); }
    applyFilters();
  });
});

function bindSlider(id, valId, cb) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener("input", () => { vl.textContent = el.value; cb(+el.value); });
}

bindSlider("wins-slider", "wins-val",     v => { minWins = v;    applyFilters(); });
bindSlider("city-slider", "city-val",     v => { minCitySize = v; applyFilters(); });
bindSlider("year-from",   "year-from-val",v => { yearFrom = v;   applyFilters(); });
bindSlider("year-to",     "year-to-val",  v => { yearTo = v;     applyFilters(); });

document.getElementById("search").addEventListener("input", applyFilters);

document.getElementById("ranked-btn").addEventListener("click", function() {
  onlyRanked = !onlyRanked;
  this.classList.toggle("active", onlyRanked);
  applyFilters();
});

// ── Data ──────────────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch("data/danish_cyclists.json");
  allData = await res.json();
  applyFilters();
}

loadData();
</script>
</body>
</html>
